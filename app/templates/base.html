<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Library Management System{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script src="{{ url_for('static', filename='js/htmx.min.js') }}" defer></script>
</head>
<body class="bg-light">

<div class="d-flex">

  <!-- Sidebar -->
  <nav class="d-flex flex-column bg-dark text-white p-3"
       style="min-width:220px; min-height:100vh; position:sticky; top:0; height:100vh;">
    <h5 class="text-white mb-4 ps-1">
      <i class="bi bi-book-half me-2"></i>LibraryMS
    </h5>
    <ul class="nav flex-column gap-1">
      <li class="nav-item">
        <a href="{{ url_for('main.dashboard') }}"
           class="nav-link text-white rounded px-3 py-2
           {% if request.endpoint == 'main.dashboard' %}bg-secondary{% endif %}">
          <i class="bi bi-speedometer2 me-2"></i>Dashboard
        </a>
      </li>
      <li class="nav-item">
        <a href="{{ url_for('books.index') }}"
           class="nav-link text-white rounded px-3 py-2
           {% if request.endpoint and 'books' in request.endpoint %}bg-secondary{% endif %}">
          <i class="bi bi-journals me-2"></i>Books
        </a>
      </li>
      <li class="nav-item">
        <a href="{{ url_for('members.index') }}"
           class="nav-link text-white rounded px-3 py-2
           {% if request.endpoint and 'members' in request.endpoint %}bg-secondary{% endif %}">
          <i class="bi bi-people me-2"></i>Members
        </a>
      </li>
      <li class="nav-item">
        <a href="{{ url_for('loans.index') }}"
           class="nav-link text-white rounded px-3 py-2
           {% if request.endpoint and 'loans' in request.endpoint %}bg-secondary{% endif %}">
          <i class="bi bi-arrow-left-right me-2"></i>Loans
        </a>
      </li>
    </ul>
  </nav>

  <!-- Main content -->
  <main class="flex-grow-1 p-4" style="min-height:100vh;">

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="mb-3">
          {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dismissible fade show mb-2" role="alert">
              {{ message }}
              <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
