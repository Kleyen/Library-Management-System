<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Library Management System{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script src="{{ url_for('static', filename='js/htmx.min.js') }}" defer></script>
</head>
<body>

  <!-- Sidebar -->
  <div class="d-flex">
    <nav class="sidebar bg-dark text-white p-3" style="min-width:220px; min-height:100vh;">
      <h5 class="text-white mb-4"><i class="bi bi-book"></i> LibraryMS</h5>
      <ul class="nav flex-column">
        <li class="nav-item mb-2">
          <a href="{{ url_for('main.dashboard') }}"
             class="nav-link text-white {% if request.endpoint == 'main.dashboard' %}active bg-secondary rounded{% endif %}">
            <i class="bi bi-speedometer2"></i> Dashboard
          </a>
        </li>
        <li class="nav-item mb-2">
          <a href="{{ url_for('books.index') }}"
             class="nav-link text-white {% if 'books' in request.endpoint %}active bg-secondary rounded{% endif %}">
            <i class="bi bi-journals"></i> Books
          </a>
        </li>
        <li class="nav-item mb-2">
          <a href="{{ url_for('members.index') }}"
             class="nav-link text-white {% if 'members' in request.endpoint %}active bg-secondary rounded{% endif %}">
            <i class="bi bi-people"></i> Members
          </a>
        </li>
        <li class="nav-item mb-2">
          <a href="{{ url_for('loans.index') }}"
             class="nav-link text-white {% if 'loans' in request.endpoint %}active bg-secondary rounded{% endif %}">
            <i class="bi bi-arrow-left-right"></i> Loans
          </a>
        </li>
      </ul>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow-1 p-4">
      <!-- Flash Messages -->
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }} alert-dismissible fade show" role="alert">
              {{ message }}
              <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      {% block content %}{% endblock %}
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
