{% extends 'base.html' %}
{% block title %}Members — LibraryMS{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2 class="mb-0">Members</h2>
  <a href="{{ url_for('members.add') }}" class="btn btn-primary">
    <i class="bi bi-plus-lg me-1"></i>Add Member
  </a>
</div>

<!-- Live search -->
<div class="mb-3">
  <input type="text"
         class="form-control"
         placeholder="Search by name, student ID, or email..."
         value="{{ search }}"
         hx-get="{{ url_for('members.index') }}"
         hx-trigger="keyup changed delay:400ms"
         hx-target="#members-tbody"
         hx-swap="innerHTML"
         name="search">
</div>

<!-- Table -->
<div class="card">
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th>Student ID</th>
            <th>Full Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Program</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="members-tbody">
          {% include 'partials/member_table.html' %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
