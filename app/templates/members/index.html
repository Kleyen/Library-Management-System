{% extends 'base.html' %}
{% block title %}Members{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2>Members</h2>
  <a href="{{ url_for('members.add') }}" class="btn btn-primary">
    <i class="bi bi-plus"></i> Add Member
  </a>
</div>

<!-- Search -->
<div class="mb-3">
  <input type="text" name="search" placeholder="Search by name, student ID, or email..."
    class="form-control"
    hx-get="{{ url_for('members.index') }}"
    hx-trigger="keyup changed delay:400ms"
    hx-target="#members-table-body"
    hx-swap="innerHTML"
    value="{{ search }}">
</div>

<!-- Table -->
<div class="card">
  <div class="card-body p-0">
    <table class="table table-hover mb-0">
      <thead class="table-light">
        <tr>
          <th>Student ID</th>
          <th>Full Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Program</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="members-table-body">
        {% include 'partials/member_table.html' %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
