{% extends 'base.html' %}
{% block title %}Books{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2>Books</h2>
  <a href="{{ url_for('books.add') }}" class="btn btn-primary">
    <i class="bi bi-plus"></i> Add Book
  </a>
</div>

<!-- Search -->
<div class="mb-3">
  <input type="text" name="search" placeholder="Search by title, author, or ISBN..."
    class="form-control"
    hx-get="{{ url_for('books.index') }}"
    hx-trigger="keyup changed delay:400ms"
    hx-target="#books-table-body"
    hx-swap="innerHTML"
    value="{{ search }}">
</div>

<!-- Table -->
<div class="card">
  <div class="card-body p-0">
    <table class="table table-hover mb-0">
      <thead class="table-light">
        <tr>
          <th>Title</th>
          <th>Author</th>
          <th>ISBN</th>
          <th>Genre</th>
          <th>Year</th>
          <th>Qty</th>
          <th>Available</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="books-table-body">
        {% include 'partials/book_table.html' %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
