{% extends 'base.html' %}
{% block title %}Books — LibraryMS{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2 class="mb-0">Books</h2>
  <a href="{{ url_for('books.add') }}" class="btn btn-primary">
    <i class="bi bi-plus-lg me-1"></i>Add Book
  </a>
</div>

<!-- Live search -->
<div class="mb-3">
  <input type="text"
         class="form-control"
         placeholder="Search by title, author, or ISBN..."
         value="{{ search }}"
         hx-get="{{ url_for('books.index') }}"
         hx-trigger="keyup changed delay:400ms"
         hx-target="#books-tbody"
         hx-swap="innerHTML"
         name="search">
</div>

<!-- Table -->
<div class="card">
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th>Title</th>
            <th>Author</th>
            <th>ISBN</th>
            <th>Genre</th>
            <th>Year</th>
            <th>Qty</th>
            <th>Available</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="books-tbody">
          {% include 'partials/book_table.html' %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
