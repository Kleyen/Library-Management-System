{% extends 'base.html' %}
{% block title %}Loans — LibraryMS{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2 class="mb-0">Loans</h2>
  <a href="{{ url_for('loans.add') }}" class="btn btn-primary">
    <i class="bi bi-plus-lg me-1"></i>Add Loan
  </a>
</div>

<!-- Status filter -->
<div class="mb-3 d-flex gap-2 flex-wrap">
  <a href="{{ url_for('loans.index') }}"
     class="btn btn-sm {{ 'btn-dark' if not status else 'btn-outline-dark' }}">
    All
  </a>
  <a href="{{ url_for('loans.index', status='active') }}"
     class="btn btn-sm {{ 'btn-primary' if status == 'active' else 'btn-outline-primary' }}">
    Active
  </a>
  <a href="{{ url_for('loans.index', status='overdue') }}"
     class="btn btn-sm {{ 'btn-danger' if status == 'overdue' else 'btn-outline-danger' }}">
    Overdue
  </a>
  <a href="{{ url_for('loans.index', status='returned') }}"
     class="btn btn-sm {{ 'btn-success' if status == 'returned' else 'btn-outline-success' }}">
    Returned
  </a>
</div>

<!-- Table -->
<div class="card">
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th>Book</th>
            <th>Member</th>
            <th>Borrow Date</th>
            <th>Due Date</th>
            <th>Return Date</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="loans-tbody">
          {% include 'partials/loan_table.html' %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
