{% for member in members %}
<tr id="member-row-{{ member.id }}">
  <td>{{ member.student_id }}</td>
  <td>{{ member.full_name }}</td>
  <td>{{ member.email }}</td>
  <td>{{ member.phone or '—' }}</td>
  <td>{{ member.program or '—' }}</td>
  <td>
    <a href="{{ url_for('members.detail', id=member.id) }}" class="btn btn-sm btn-info">
      <i class="bi bi-eye"></i>
    </a>
    <a href="{{ url_for('members.edit', id=member.id) }}" class="btn btn-sm btn-warning">
      <i class="bi bi-pencil"></i>
    </a>
    <form action="{{ url_for('members.delete', id=member.id) }}" method="POST" class="d-inline"
          onsubmit="return confirm('Delete this member?')">
      <button type="submit" class="btn btn-sm btn-danger">
        <i class="bi bi-trash"></i>
      </button>
    </form>
  </td>
</tr>
{% else %}
<tr><td colspan="6" class="text-center text-muted">No members found.</td></tr>
{% endfor %}
